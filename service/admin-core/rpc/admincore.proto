syntax = "proto3";

package rpc;
option go_package="./rpc";

message Request {
  string ping = 1;
}

message Response {
  string pong = 1;
}

message HelloRequest {
  string name = 1;
}

message HelloResponse {
  string message = 1;
}

service Rpc {
  rpc Ping(Request) returns(Response);
  rpc Hello(HelloRequest) returns(HelloResponse);
  rpc Testerr(Request) returns(Response);
}