Name: product-api
Host: 0.0.0.0
Port: 8811

Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: product.api

Redis:
  Address: 127.0.0.1:6379
  Pass: ""

Mysql:
  Datasource: root:root@tcp(127.0.0.1:3306)/xiaoxiao_admin?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai

Swagger:
  IsTest: true  #是否打开swagger，true为打开，false为关闭（生产环境需要关闭）
  Path: "api/product/static"

Log:
  ServiceName: product-api
  Stat: false # go-zero 版本 >= 1.5.0 才支持
  Mode: file
  Path: logs/product-api